<svg width="900" height="300" viewBox="0 0 900 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HaraYon — notebook tecnológico animado</title>
  <desc id="desc">Notebook neon flutuando sobre uma grade em perspectiva, com código e partículas animadas.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="900" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060B18"/>
      <stop offset="0.5" stop-color="#0B1530"/>
      <stop offset="1" stop-color="#07111E"/>
    </linearGradient>
    <linearGradient id="cyanPurple" x1="330" y1="74" x2="570" y2="226" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="topFace" x1="450" y1="72" x2="450" y2="154" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="353" y1="153" x2="450" y2="229" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#172554" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="547" y1="153" x2="450" y2="229" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A855F7" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#312E81" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="halo">
      <stop stop-color="#22D3EE" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="28" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V28" stroke="#38BDF8" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <clipPath id="rounded">
      <rect width="900" height="300" rx="18"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="900" height="300" fill="url(#background)"/>
    <circle cx="450" cy="146" r="150" fill="url(#halo)" filter="url(#softGlow)">
      <animate attributeName="r" values="125;165;125" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0.9;0.55" dur="6s" repeatCount="indefinite"/>
    </circle>

    <g opacity="0.72" transform="translate(0 186) skewX(-18) scale(1 0.72)">
      <rect x="-80" y="0" width="1060" height="190" fill="url(#grid)">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 28" dur="2.4s" repeatCount="indefinite"/>
      </rect>
    </g>
    <path d="M0 235H900" stroke="url(#cyanPurple)" stroke-opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.25;0.8;0.25" dur="3.2s" repeatCount="indefinite"/>
    </path>

    <g filter="url(#glow)" opacity="0.9">
      <ellipse cx="450" cy="232" rx="147" ry="26" stroke="url(#cyanPurple)" stroke-width="2" stroke-dasharray="22 14">
        <animate attributeName="stroke-dashoffset" values="0;-72" dur="3s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="450" cy="232" rx="105" ry="17" stroke="#22D3EE" stroke-opacity="0.55" stroke-dasharray="8 12">
        <animate attributeName="stroke-dashoffset" values="0;80" dur="4s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <g>
      <animateTransform attributeName="transform" type="translate" values="0 -4;0 5;0 -4" dur="5s" repeatCount="indefinite"/>
      <rect x="338" y="66" width="224" height="142" rx="12" fill="#071426" stroke="url(#cyanPurple)" stroke-width="3" filter="url(#glow)"/>
      <rect x="348" y="76" width="204" height="121" rx="7" fill="#050A16" stroke="#38BDF8" stroke-opacity="0.42"/>
      <circle cx="450" cy="71" r="2" fill="#67E8F9"/>

      <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
        <circle cx="362" cy="89" r="3" fill="#FB7185"/>
        <circle cx="373" cy="89" r="3" fill="#FACC15"/>
        <circle cx="384" cy="89" r="3" fill="#4ADE80"/>
        <text x="362" y="111" fill="#64748B" font-size="8">~/portfolio</text>
        <text x="362" y="131" fill="#22D3EE" font-size="11">$</text>
        <text x="376" y="131" fill="#E2E8F0" font-size="11">npm run build</text>
        <rect x="362" y="144" width="134" height="5" rx="2.5" fill="#2563EB" opacity="0.75">
          <animate attributeName="width" values="28;134;28" dur="4.2s" repeatCount="indefinite"/>
        </rect>
        <rect x="362" y="157" width="164" height="4" rx="2" fill="#A855F7" opacity="0.55">
          <animate attributeName="width" values="72;164;72" dur="5.1s" repeatCount="indefinite"/>
        </rect>
        <rect x="362" y="169" width="112" height="4" rx="2" fill="#22D3EE" opacity="0.58">
          <animate attributeName="width" values="112;58;112" dur="3.7s" repeatCount="indefinite"/>
        </rect>
        <text x="362" y="187" fill="#4ADE80" font-size="9">✓ ready in 1.8s</text>
        <rect x="449" y="120" width="2" height="13" fill="#E0F2FE">
          <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
        </rect>
      </g>

      <path d="M338 207H562L614 244H286L338 207Z" fill="url(#leftFace)" stroke="url(#cyanPurple)" stroke-width="2.5" filter="url(#glow)"/>
      <path d="M354 213H546L574 234H326L354 213Z" fill="#0C1830" stroke="#38BDF8" stroke-opacity="0.5"/>
      <g stroke="#60A5FA" stroke-opacity="0.48" stroke-width="1">
        <path d="M363 217H537M348 222H552M335 228H565"/>
        <path d="M380 213L367 234M401 213L393 234M423 213L419 234M446 213V234M469 213L474 234M491 213L501 234M513 213L528 234"/>
      </g>
      <path d="M418 235H482L474 241H426L418 235Z" fill="#0F2746" stroke="#A855F7" stroke-opacity="0.7"/>
      <path d="M286 244H614L598 251H302L286 244Z" fill="#0B1224" stroke="#22D3EE" stroke-width="1.5"/>
      <circle cx="450" cy="207" r="5" fill="#F8FAFC" filter="url(#glow)">
        <animate attributeName="r" values="3.5;6;3.5" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g fill="#67E8F9" filter="url(#glow)">
      <circle cx="173" cy="80" r="2.5">
        <animateTransform attributeName="transform" type="translate" values="0 8;0 -14;0 8" dur="4.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.25;1;0.25" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="257" cy="166" r="2">
        <animateTransform attributeName="transform" type="translate" values="0 -10;0 12;0 -10" dur="3.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="667" cy="91" r="2.5">
        <animateTransform attributeName="transform" type="translate" values="0 12;0 -10;0 12" dur="5.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="735" cy="177" r="2">
        <animateTransform attributeName="transform" type="translate" values="0 -8;0 14;0 -8" dur="4.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="3">
      <text x="450" y="42" fill="url(#cyanPurple)" font-size="27" font-weight="700" text-anchor="middle" filter="url(#glow)">HaraYon
        <animate attributeName="opacity" values="0.72;1;0.72" dur="2.8s" repeatCount="indefinite"/>
      </text>
      <text x="450" y="42" fill="none" stroke="#E0F2FE" stroke-width="0.7" stroke-dasharray="12 8" font-size="27" font-weight="700" text-anchor="middle">HaraYon
        <animate attributeName="stroke-dashoffset" values="0;-40" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="0.18;0.8;0.18" dur="2.8s" repeatCount="indefinite"/>
      </text>
      <text x="34" y="44" fill="#64748B" font-size="10">PROFILE // ONLINE</text>
      <circle cx="20" cy="40" r="4" fill="#22C55E">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <text x="450" y="276" fill="#CBD5E1" font-size="13" text-anchor="middle">BUILD • AUTOMATE • EVOLVE</text>
      <text x="866" y="44" fill="#475569" font-size="10" text-anchor="end">DEV / PROFILE</text>
    </g>

    <rect x="0" y="-55" width="900" height="46" fill="url(#cyanPurple)" opacity="0.07">
      <animate attributeName="y" values="-55;330" dur="5.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="0.75" y="0.75" width="898.5" height="298.5" rx="17.25" stroke="url(#cyanPurple)" stroke-opacity="0.36" stroke-width="1.5"/>
</svg>
